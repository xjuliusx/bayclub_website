<svg width="680" height="310" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg">
  <title>The Bay Club Logo</title>
  <desc>Architectural gate mark with wave ornament and wordmark for The Bay Club, Bayside, New York</desc>

  <!-- Gate/arch mark -->
  <path d="M304,140 L304,86 Q340,48 376,86 L376,140 L362,140 L362,91 Q340,66 318,91 L318,140 Z" fill="#0D2340"/>

  <!-- Gold architectural capitals -->
  <rect x="300" y="83" width="21" height="5" fill="#B8965A"/>
  <rect x="359" y="83" width="21" height="5" fill="#B8965A"/>

  <!-- Gold base plates -->
  <rect x="300" y="137" width="21" height="5" fill="#B8965A"/>
  <rect x="359" y="137" width="21" height="5" fill="#B8965A"/>

  <!-- Gold keystone diamond -->
  <polygon points="340,58 349,68 340,78 331,68" fill="#B8965A"/>

  <!-- Gold wave ornament -->
  <path d="M288,165 Q315,152 340,165 Q365,178 392,165"
        stroke="#B8965A" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Gold horizontal rule -->
  <line x1="244" y1="181" x2="436" y2="181" stroke="#B8965A" stroke-width="0.75"/>

  <!-- THE BAY CLUB wordmark -->
  <text x="340" y="225" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="46" letter-spacing="8" fill="#0D2340">THE BAY CLUB</text>

  <!-- BAYSIDE · NEW YORK -->
  <text x="340" y="270" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="30" letter-spacing="6" fill="#B8965A">BAYSIDE · NEW YORK</text>
</svg>
